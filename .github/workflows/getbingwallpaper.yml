name: Get Bing Wallpaper

on:
  schedule:
    - cron: '0 5,17 * * *'
  workflow_dispatch:

concurrency:
  group: bing-wallpaper-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  process_wallpapers:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: '3.13'
          cache: pip
          cache-dependency-path: program/requirements.txt

      - name: Install dependencies
        run: python -m pip install --disable-pip-version-check --requirement program/requirements.txt

      - name: Update wallpaper archive
        run: |
          python -m program.generate_json
          python -m program.generate_readme

      - name: Commit and push changes
        run: |
          git config user.name 'GitHub Actions Bot'
          git config user.email 'actions@github.com'
          git add README.md data/data.json

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          wallpaper_date=$(python -c "from program.archive import load_archive; value = load_archive(require_sorted=True, require_contiguous=True)[0]['image_date']; print(f'{value[:4]}-{value[4:6]}-{value[6:]}')")
          git commit -m "Update daily Bing wallpaper: ${wallpaper_date}"
          git pull --rebase origin main
          git push origin HEAD:main
